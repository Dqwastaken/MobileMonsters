<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web AR Monster Catcher</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        #auth-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: flex; justify-content: center; align-items: center;
        }
        #auth-box {
            background: white; padding: 30px; border-radius: 12px;
            text-align: center; width: 80%; max-width: 300px;
        }
        #auth-box input {
            width: 90%; padding: 10px; margin: 10px 0;
            border: 1px solid #ccc; border-radius: 5px; font-size: 16px;
        }
        #auth-btn {
            width: 100%; padding: 12px; background: #007aff; color: white;
            border: none; border-radius: 20px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
        #auth-toggle { margin-top: 15px; font-size: 14px; color: #555; cursor: pointer; }
        #auth-status { margin-top: 10px; color: #ff3b30; font-weight: bold; font-size: 14px; }
        
        /* Map UI Layers */
        #map-screen { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; 
            display: none; 
        }
        #map { width: 100%; height: 100%; }
        
        #ui-layer { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 1000; 
            text-align: center; 
            width: 90%; 
            pointer-events: none; 
        }
        #status, #catch-btn { pointer-events: auto; }
        #status { background: rgba(255,255,255,0.9); padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #catch-btn { display: none; padding: 15px 30px; font-size: 20px; font-weight: bold; background: #ff3b30; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        /* AR Screen UI Layers */
        #ar-screen { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 2000; 
            visibility: hidden; 
        }
        #back-btn { position: absolute; top: 20px; left: 20px; z-index: 2100; padding: 10px 20px; background: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        #ar-ui-layer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2100;
            text-align: center;
            width: 90%;
        }
        #ar-throw-btn { padding: 15px 40px; font-size: 22px; font-weight: bold; background: #007aff; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        #ar-status { background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 10px; font-weight: bold; }

        #gif-proxy-container { display: none; }
    </style>
</head>
<body>

    <div id="gif-proxy-container">
        <img id="native-gif-element" crossOrigin="anonymous" src="" />
    </div>

    <div id="auth-screen">
        <div id="auth-box">
            <h2 id="auth-title">Trainer Login</h2>
            <input type="text" id="username" placeholder="Enter Username" required>
            <button id="auth-btn" onclick="submitAuth()">Login</button>
            <p id="auth-toggle" onclick="toggleAuthMode()">Need an account? <b>Register here</b></p>
            <div id="auth-status"></div>
        </div>
    </div>

    <div id="map-screen">
        <div id="map"></div>
        <div id="ui-layer">
            <div id="status">Acquiring satellite lock...</div>
            <button id="catch-btn" onclick="startEncounter()">A wild monster appeared! CATCH IT!</button>
        </div>
    </div>

    <div id="ar-screen">
        <button id="back-btn" onclick="fleeEncounter()">Run Away</button>
        
        <div id="ar-ui-layer">
            <div id="ar-status">Ready to capture!</div><br>
            <button id="ar-throw-btn" onclick="throwBall()">THROW BALL</button>
        </div>

        <a-scene embedded vr-mode-ui="enabled: false">
            <a-camera look-controls="pointerLockEnabled: false">
                <a-cursor visible="false"></a-cursor>
            </a-camera>
            
            <a-sky color="#87CEEB"></a-sky> 
            
            <a-image id="monster" position="0 1.5 -4" width="1.8" height="1.8" material="transparent: true; shader: flat;"></a-image>
            
            <a-sphere id="pokeball" position="0 0.2 -1.2" radius="0.12" color="#ff3b30"></a-sphere>
            
            <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
        </a-scene>
    </div>

    <script>
        let map, userMarker;
        let userLat, userLng;
        let monsters = []; 
        let activeMonster = null; 
        let isThrowing = false;
        let textureLoopId = null;
        
        let isLoginMode = true;
        let currentUser = null;

        // Authentication Logic
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Trainer Login" : "Register New Trainer";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Login" : "Register";
            document.getElementById('auth-toggle').innerHTML = isLoginMode ? "Need an account? <b>Register here</b>" : "Already have an account? <b>Login here</b>";
            document.getElementById('auth-status').innerText = "";
        }

        async function submitAuth() {
            const usernameInp = document.getElementById('username').value.trim();
            const statusDiv = document.getElementById('auth-status');

            if (!usernameInp) {
                statusDiv.innerText = "Please enter a username.";
                return;
            }

            const endpoint = isLoginMode ? 'login.php' : 'register.php';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInp })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('map-screen').style.display = 'block';
                    
                    currentUser = data.username;
                    initMap(); 
                } else {
                    statusDiv.innerText = data.error || "Authentication failed.";
                }
            } catch (error) {
                statusDiv.innerText = "Server error. Is your backend running?";
            }
        }

        // Map and Gameplay Logic
        function initMap() {
            map = L.map('map').setView([0, 0], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;

                        if (!userMarker) {
                            userMarker = L.circleMarker([userLat, userLng], { color: 'blue', radius: 8 }).addTo(map);
                            map.setView([userLat, userLng], 18);
                            loadMonstersFromJson(); 
                        } else {
                            userMarker.setLatLng([userLat, userLng]);
                        }

                        checkDistances();
                    },
                    (err) => { document.getElementById('status').innerText = "GPS Error. Please enable location."; },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                );
            } else {
                document.getElementById('status').innerText = "Geolocation not supported.";
            }
        }

        async function loadMonstersFromJson() {
            try {
                const response = await fetch('monsters.json');
                const data = await response.json();
                
                const monsterIcon = L.icon({
                    iconUrl: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png',
                    iconSize: [40, 40]
                });

                data.forEach(poke => {
                    let marker = L.marker([poke.lat, poke.lng], { icon: monsterIcon }).addTo(map);
                    marker.bindPopup(`<b>${poke.name}</b>`);
                    
                    monsters.push({
                        id: poke.id,
                        pokedex_number: poke.pokedex_number,
                        name: poke.name,
                        lat: poke.lat,
                        lng: poke.lng,
                        marker: marker
                    });
                });
                
                checkDistances();
            } catch (error) {
                console.error("Database fetch failed:", error);
                document.getElementById('status').innerText = "Error: Map could not read monsters.json database.";
            }
        }

        function checkDistances() {
            if (monsters.length === 0) {
                document.getElementById('status').innerText = "All monsters captured!";
                document.getElementById('catch-btn').style.display = 'none';
                return;
            }

            const userLatLng = L.latLng(userLat, userLng);
            let closestMonster = null;
            let minDistanceFeet = Infinity;

            monsters.forEach(monster => {
                const monsterLatLng = L.latLng(monster.lat, monster.lng);
                const distanceMeters = userLatLng.distanceTo(monsterLatLng);
                const distanceFeet = distanceMeters * 3.28084;
                
                if (distanceFeet < minDistanceFeet) {
                    minDistanceFeet = distanceFeet;
                    closestMonster = monster;
                }
            });

            document.getElementById('status').innerText = `Closest: ${closestMonster.name} (${Math.round(minDistanceFeet)} feet away)`;

            if (minDistanceFeet < 20) {
                activeMonster = closestMonster;
                document.getElementById('catch-btn').innerText = `A wild ${activeMonster.name} appeared! CATCH IT!`;
                document.getElementById('catch-btn').style.display = 'inline-block';
            } else {
                activeMonster = null;
                document.getElementById('catch-btn').style.display = 'none';
            }
        }

        function startEncounter() {
            document.getElementById('map-screen').style.visibility = 'hidden';
            document.getElementById('ar-screen').style.visibility = 'visible';
            resetEncounterScene();
        }

        function fleeEncounter() {
            if (textureLoopId) {
                cancelAnimationFrame(textureLoopId);
                textureLoopId = null;
            }
            document.getElementById('map-screen').style.visibility = 'visible';
            document.getElementById('ar-screen').style.visibility = 'hidden';
        }

        function resetEncounterScene() {
            isThrowing = false;
            document.getElementById('ar-throw-btn').style.display = 'inline-block';
            document.getElementById('ar-status').innerText = `Capturing wild ${activeMonster ? activeMonster.name : "Target"}...`;
            
            const monster = document.getElementById('monster');
            const ball = document.getElementById('pokeball');
            const nativeImg = document.getElementById('native-gif-element');
            
            if (activeMonster) {
                const gifUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/${activeMonster.pokedex_number}.gif`;
                
                nativeImg.src = gifUrl;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                nativeImg.onload = () => {
                    canvas.width = nativeImg.naturalWidth || 128;
                    canvas.height = nativeImg.naturalHeight || 128;
                    
                    function updateTexture() {
                        if (monster.getAttribute('visible') !== 'false') {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            ctx.drawImage(nativeImg, 0, 0, canvas.width, canvas.height);
                            
                            const mesh = monster.getObject3D('mesh');
                            if (mesh && mesh.material) {
                                if (!mesh.material.map || mesh.material.map.image !== canvas) {
                                    const texture = new THREE.CanvasTexture(canvas);
                                    texture.minFilter = THREE.LinearFilter;
                                    mesh.material.map = texture;
                                }
                                mesh.material.map.needsUpdate = true;
                            }
                            textureLoopId = requestAnimationFrame(updateTexture);
                        }
                    }
                    if (textureLoopId) cancelAnimationFrame(textureLoopId);
                    textureLoopId = requestAnimationFrame(updateTexture);
                };
            }
            
            monster.setAttribute('visible', 'true');
            monster.setAttribute('scale', '1 1 1');
            monster.removeAttribute('animation');
            
            ball.setAttribute('position', '0 0.2 -1.2');
            ball.setAttribute('color', '#ff3b30');
            ball.removeAttribute('animation');
        }

        function throwBall() {
            if (isThrowing) return;
            isThrowing = true;
            
            document.getElementById('ar-throw-btn').style.display = 'none';
            document.getElementById('ar-status').innerText = "Go!";

            const ball = document.getElementById('pokeball');
            const monster = document.getElementById('monster');

            ball.setAttribute('animation', 'property: position; to: 0 1.5 -3.8; dur: 600; easing: easeOutQuad');

            setTimeout(() => {
                document.getElementById('ar-status').innerText = "Contact!";
                monster.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 300');
                
                setTimeout(() => {
                    monster.setAttribute('visible', 'false');
                    if (textureLoopId) {
                        cancelAnimationFrame(textureLoopId);
                        textureLoopId = null;
                    }
                    ball.setAttribute('animation', 'property: position; to: 0 0.12 -3.8; dur: 400; easing: easeInQuad');
                    
                    setTimeout(() => {
                        runShakeSequence(1);
                    }, 450);
                }, 300);
            }, 600);
        }

        function runShakeSequence(shakeNumber) {
            if (shakeNumber > 3) {
                executeCatchSuccess();
                return;
            }

            document.getElementById('ar-status').innerText = `Shaking... ${shakeNumber}`;
            const ball = document.getElementById('pokeball');

            let tiltDir = shakeNumber % 2 === 0 ? 15 : -15;
            ball.setAttribute('animation', `property: rotation; to: 0 0 ${tiltDir}; dur: 150; dir: alternate; loop: 2`);

            setTimeout(() => {
                ball.removeAttribute('animation');
                ball.setAttribute('rotation', '0 0 0');
                
                setTimeout(() => {
                    runShakeSequence(shakeNumber + 1);
                }, 400);
            }, 300);
        }

        function executeCatchSuccess() {
            document.getElementById('ar-status').innerText = `${activeMonster ? activeMonster.name : "Target"} Secured!`;
            const ball = document.getElementById('pokeball');
            ball.setAttribute('color', '#4CD964');

            setTimeout(() => {
                if (activeMonster) {
                    map.removeLayer(activeMonster.marker);
                    monsters = monsters.filter(m => m.id !== activeMonster.id);
                    activeMonster = null;
                }
                
                fleeEncounter();
                checkDistances();
            }, 1200);
        }
    </script>
</body>
</html>
